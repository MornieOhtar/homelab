# https://github.com/bitnami/charts/blob/main/bitnami/keycloak/values.yaml
commonLabels:
  app.kubernetes.io/name: keycloak

auth:
  adminUser: root
  existingSecret: keycloak-root-pass
  passwordSecretKey: "password"

tls:
  enabled: true
  autoGenerated:
    enabled: true

ingress:
  enabled: false
adminIngress:
  enabled: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: "operators"
    labels:
      release: prometheus-operator
    selector:
      app.kubernetes.io/name: keycloak
    jobLabel: "keycloak"
  prometheusRule:
    enabled: true

postgresql:
  enabled: false

externalDatabase:
  host: pg-keycloak-rw
  port: 5432
  database: app
  existingSecret: "pg-keycloak-app"
  existingSecretUserKey: "user"
  existingSecretPasswordKey: "password"
