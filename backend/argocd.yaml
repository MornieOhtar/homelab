apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
spec:
  project: homelab

  sources:
    - repoURL: ssh://git@gitea.dev-env:22/MornieOhtar/homelab-argocd.git
      targetRevision: HEAD
      ref: homelab
      path: "backend/argocd"
      directory:
        recurse: true
        include: "*.yaml"
        exclude: 'values.yaml'
    - repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 8.3.0
      chart: argo-cd
      helm:
        valueFiles:
          - $homelab/backend/argocd/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
