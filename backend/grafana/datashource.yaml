
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: graphana-mimir
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana-cluster-main"
  allowCrossNamespaceImport: true
  datasource:
    access: proxy
    isDefault: true
    database: prometheus
    jsonData:
      timeInterval: 10s
      tlsSkipVerify: true
      httpMethod: POST
      prometheusType: Mimir
      prometheusVersion: 2.9.1
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: mornery-homelab
    name: mimir
    type: prometheus
    url: http://mimir-gateway.monitoring/prometheus
